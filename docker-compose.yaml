services:
    postgres:
        container_name: postgres
        image: postgres:16
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - 5432:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        networks:
            - kirt08

    redis:
        container_name: redis
        image: redis:8.2
        command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
        ports:
            - 6379:6379
        volumes:
            - redis_data:/data
        networks:
            - kirt08

    redis_gui:
        container_name: redis_gui
        image: redis/redisinsight
        ports:
            - 5540:5540

    rabbitmq:
        container_name: rabbitmq
        image: rabbitmq:4-management
        ports:
            - 5672:5672
            - 15672:15672
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - kirt08

    postgres-exporter:
        container_name: postgres-exporter
        image: prometheuscommunity/postgres-exporter
        restart: always
        environment:
            DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/postgres?sslmode=disable"
        ports:
            - 9187:9187
        networks:
            - kirt08
        depends_on:
            - postgres
    
    redis-exporter:
        container_name: redis-exporter
        image: oliver006/redis_exporter
        restart: always
        command: -redis.addr=redis://:${REDIS_PASSWORD}@redis:6379
        ports:
            - 9121:9121
        networks:
            - kirt08
        depends_on:
            - redis
        
    rabbitmq-exporter:
        container_name: rabbitmq-exporter
        image: kbudde/rabbitmq-exporter
        restart: always
        environment:
            RABBIT_URL: http://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:15672
        ports:
            - 9419:9419
        networks:
            - kirt08
        depends_on:
            - rabbitmq

    prometheus:
        container_name: prometheus
        image: prom/prometheus:latest
        restart: always
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - 9090:9090
        networks:
            - kirt08

    grafana:
        container_name: grafana
        image: grafana/grafana:10.2.3
        restart: unless-stopped
        ports:
          - "3000:3000"
        volumes:
          - grafana-storage:/var/lib/grafana
        depends_on:
          - prometheus
        networks:
          - kirt08
        
    jaeger:
        container_name: jaeger
        image: jaegertracing/all-in-one:1.47
        restart: unless-stopped
        ports:
            - "16686:16686"   
            - "4318:4318"     
        networks:
            - kirt08

    loki:
        container_name: loki
        image: grafana/loki:2.9.1
        restart: unless-stopped
        volumes:
            - ./loki-config.yml:/etc/loki/config.yaml
            - ./loki-data:/loki
            - ./loki-wal:/wal
        command: -config.file=/etc/loki/config.yaml
        ports:
            - "3100:3100"
        networks:
            - kirt08

    promtail:
        container_name: promtail
        image: grafana/promtail:2.9.1
        volumes:
            - ./promtail-config.yml:/etc/promtail/config.yml
            - ../logs:/var/log/services/auth/
        command: -config.file=/etc/promtail/config.yml
        privileged: true
        ports:
            - "9080:9080"
        networks:
            - kirt08

    mongo:
        container_name: mongo
        image: mongo:6
        restart: always
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        networks:
            - kirt08


volumes:
    postgres_data:
    redis_data:
    rabbitmq_data:
    grafana-storage:
    mongo_data:

networks:
    kirt08:
        external: true
