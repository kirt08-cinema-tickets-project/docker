global:
    scrape_interval: 5s

scrape_configs:
    - job_name: 'gateway'
      static_configs:
        - targets: ['gateway-service:8000']
      metrics_path: '/metrics'

    - job_name: 'auth-service'
      static_configs:
        - targets: ['auth-service:9101']
      metrics_path: '/metrics'
    
    - job_name: 'notification-service'
      static_configs:
        - targets: ['notification-service:9102']
      metrics_path: '/metrics'

    - job_name: 'postgres'
      static_configs:
        - targets:
            - 'postgres-exporter:9187'

    - job_name: 'redis'
      static_configs:
        - targets:
            - 'redis-exporter:9121'

    - job_name: 'rabbitmq'
      static_configs:
        - targets:
            - 'rabbitmq-exporter:9419'

    - job_name: 'prometheus'
      static_configs:
        - targets:
            - 'prometheus:9090'